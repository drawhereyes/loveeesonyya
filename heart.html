<!DOCTYPE html>
<html>
<head>
    <title>сердечко 💖</title>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url('2f6abdd681629d7a62b92175b36abc63+(1).jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* Текстовый блок */
        .message {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 30px;
            max-width: 80%;
            text-align: center;
            line-height: 1.6;
            margin: 20px;
        }
        
        /* Название трека */
        .track-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #ffccdd;
            text-shadow: 1px 1px 2px black;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        /* Контейнер для одного трека */
        .track-container {
            text-align: center;
            margin: 20px;
        }
        
        /* Кнопка назад */
        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 10px 20px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            z-index: 10;
        }
        .back-btn:hover {
            background: #ff1493;
        }
        
        @media (max-width: 768px) {
            .message {
                font-size: 8px;
                padding: 20px;
            }
            .track-title {
                font-size: 6px;
            }
            .back-btn {
                font-size: 8px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Первый трек -->
    <audio id="bg-music-1" src="takizava - ведь я без тебя никто.mp3" loop></audio>
    
    <!-- Второй трек -->
    <audio id="bg-music-2" src="01. @коронован - нежность.m4a" loop></audio>
    
    <!-- Текстовый блок -->
    <div class="message">
        я люблю тебя очень<br>
        прости за то что иногда тебя не слышу <br>
        я не буду больше делать так<br>
        хочу видеть на тебе всегда твою улыбку<br>
    </div>
    
    <!-- Трек 1 -->
    <div class="track-container">
        <div class="track-title">🎵 takizava — ведь я без тебя никто</div>
        <div style="display: inline-flex; gap: 20px; align-items: center; background: rgba(0,0,0,0.6); padding: 12px 25px; border-radius: 40px;">
            <button id="music-toggle-1" style="background: #ff69b4; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px;">
                <i class="fas fa-music"></i>
            </button>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <input type="range" id="volume-slider-1" class="volume-slider" min="0" max="1" step="0.01" value="0.5" style="width: 100px; cursor: pointer;">
                <span style="font-size: 8px; color: white; margin-top: 3px;">громкость(очень громкий трек)</span>
            </div>
        </div>
    </div>
    
    <!-- Трек 2 -->
    <div class="track-container">
        <div class="track-title">🎵 01. @коронован - нежность</div>
        <div style="display: inline-flex; gap: 20px; align-items: center; background: rgba(0,0,0,0.6); padding: 12px 25px; border-radius: 40px;">
            <button id="music-toggle-2" style="background: #ff69b4; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px;">
                <i class="fas fa-music"></i>
            </button>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <input type="range" id="volume-slider-2" class="volume-slider" min="0" max="1" step="0.01" value="0.5" style="width: 100px; cursor: pointer;">
                <span style="font-size: 8px; color: white; margin-top: 3px;">громкость</span>
            </div>
        </div>
    </div>
    
    <!-- Кнопка назад -->
    <button class="back-btn" onclick="window.location.href='gallery.html'">назад</button>
    
    <!-- Подключаем библиотеку иконок для музыки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script>
        // Трек 1
        const audio1 = document.getElementById('bg-music-1');
        const playButton1 = document.getElementById('music-toggle-1');
        const icon1 = playButton1.querySelector('i');
        const volumeSlider1 = document.getElementById('volume-slider-1');
        
        audio1.volume = volumeSlider1.value;
        
        function toggleMusic1() {
            if (audio1.paused) {
                // Останавливаем второй трек, если он играет
                if (!audio2.paused) {
                    audio2.pause();
                    const icon2 = document.getElementById('music-toggle-2').querySelector('i');
                    icon2.className = 'fas fa-music';
                }
                audio1.play().catch(e => console.log('Автовоспроизведение заблокировано'));
                icon1.className = 'fas fa-pause';
            } else {
                audio1.pause();
                icon1.className = 'fas fa-music';
            }
        }
        playButton1.addEventListener('click', toggleMusic1);
        
        volumeSlider1.addEventListener('input', function() {
            audio1.volume = this.value;
        });
        
        // Трек 2
        const audio2 = document.getElementById('bg-music-2');
        const playButton2 = document.getElementById('music-toggle-2');
        const icon2 = playButton2.querySelector('i');
        const volumeSlider2 = document.getElementById('volume-slider-2');
        
        audio2.volume = volumeSlider2.value;
        
        function toggleMusic2() {
            if (audio2.paused) {
                // Останавливаем первый трек, если он играет
                if (!audio1.paused) {
                    audio1.pause();
                    icon1.className = 'fas fa-music';
                }
                audio2.play().catch(e => console.log('Автовоспроизведение заблокировано'));
                icon2.className = 'fas fa-pause';
            } else {
                audio2.pause();
                icon2.className = 'fas fa-music';
            }
        }
        playButton2.addEventListener('click', toggleMusic2);
        
        volumeSlider2.addEventListener('input', function() {
            audio2.volume = this.value;
        });
    </script>
</body>
</html>
