<!DOCTYPE html>
<html>
<head>
    <title>сердечко 💖</title>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url('2f6abdd681629d7a62b92175b36abc63+(1).jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* Текстовый блок */
        .message {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 30px;
            max-width: 80%;
            text-align: center;
            line-height: 1.6;
            margin: 20px;
        }
        
        /* Кнопка назад */
        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 10px 20px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            z-index: 10;
        }
        .back-btn:hover {
            background: #ff1493;
        }
        
        @media (max-width: 768px) {
            .message {
                font-size: 8px;
                padding: 20px;
            }
            .back-btn {
                font-size: 8px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Невидимый аудиоплеер -->
    <audio id="bg-music" src="takizava - ведь я без тебя никто.mp3" loop></audio>
    
    <!-- Текстовый блок -->
    <div class="message">
        я люблю тебя очень<br>
        прости за то что иногда тебя не слышу <br>
        я не буду больше делать так<br>
        хочу видеть на тебе всегда твою улыбку<br>
    </div>
    
    <!-- Блок управления музыкой под текстом -->
    <div style="text-align: center; margin: 20px;">
        <div style="display: inline-flex; gap: 20px; align-items: center; background: rgba(0,0,0,0.6); padding: 12px 25px; border-radius: 40px;">
            <button id="music-toggle" style="background: #ff69b4; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px;">
                <i class="fas fa-music"></i>
            </button>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" style="width: 100px; cursor: pointer;">
                <span style="font-size: 8px; color: white; margin-top: 3px;">громкость</span>
            </div>
        </div>
    </div>
    
    <!-- Кнопка назад -->
    <button class="back-btn" onclick="window.location.href='gallery.html'">назад</button>
    
    <!-- Подключаем библиотеку иконок для музыки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script>
        const audio = document.getElementById('bg-music');
        const playButton = document.getElementById('music-toggle');
        const icon = playButton.querySelector('i');
        const volumeSlider = document.getElementById('volume-slider');
        
        audio.volume = volumeSlider.value;
        
        function toggleMusic() {
            if (audio.paused) {
                audio.play().catch(e => console.log('Автовоспроизведение заблокировано'));
                icon.className = 'fas fa-pause';
            } else {
                audio.pause();
                icon.className = 'fas fa-music';
            }
        }
        playButton.addEventListener('click', toggleMusic);
        
        volumeSlider.addEventListener('input', function() {
            audio.volume = this.value;
        });
    </script>
</body>
</html>
