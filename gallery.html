<!DOCTYPE html>
<html>
<head>
    <title>лав ю</title>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url('2f6abdd681629d7a62b92175b36abc63+(1).jpg'); /* поменяй на свою */
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        /* Стиль для всех картинок */
        .corner-img {
            position: absolute;
            width: 250px;  /* ширина картинки */
            height: auto;   /* высота подстроится сама */
            opacity: 0.9;
            transition: transform 0.3s;
        }
        
        .corner-img:hover {
            transform: scale(1.05);
        }
        
        /* Углы */
        .top-left {
            top: 20px;
            left: 20px;
        }
        .top-right {
            top: 20px;
            right: 20px;
        }
        .bottom-left {
            bottom: 20px;
            left: 20px;
        }
        .bottom-right {
            bottom: 20px;
            right: 20px;
        }
        
        /* Центр (если хочешь одну картинку по центру) */
        .center {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* Кнопка назад */
        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 10px 20px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            z-index: 10;
        }
        .back-btn:hover {
            background: #ff1493;
        }
    </style>
</head>
<body>
    <!-- Картинки по углам -->
    <img src="d0e412b8d4718fcd4fb9c6ce12b7afbc.jpg" class="corner-img top-left" alt="я">
    <img src="f1d1c9e3b16e4481e5a3b058064b7d93.jpg" class="corner-img top-right" alt="тебя">
    <img src="20.05.2026_4-03-03.png" class="corner-img bottom-left" alt="очень">
    <img src="84195a2d8a73058cab06d867620c00d6.jpg" class="corner-img bottom-right" alt="люблю">
    
    <!-- Кнопка назад -->
    <button class="back-btn" onclick="window.location.href='index.html'">назад</button>
</body>
</html>
