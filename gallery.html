<!DOCTYPE html>
<html>
<head>
    <title>лав ю</title>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url('d46974ac2cb668affc08f47c399cec91.jpg'); 
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        /* Контейнер для картинки с подписью */
        .corner-img {
            position: absolute;
            width: auto;
            text-align: center;
            transition: transform 0.3s;
        }
        
        .corner-img:hover {
            transform: scale(1.05);
        }
        
        /* Сама картинка */
        .corner-img img {
            width: 200px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: block;
        }
        
        /* Подпись под картинкой */
        .corner-img figcaption {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: white;
            text-shadow: 1px 1px 2px black;
            margin-top: 8px;
            background: rgba(0,0,0,0.5);
            padding: 5px 8px;
            border-radius: 20px;
            display: inline-block;
        }
        
        /* Углы */
        .top-left {
            top: 20px;
            left: 20px;
        }
        .top-right {
            top: 20px;
            right: 20px;
        }
        .bottom-left {
            bottom: 20px;
            left: 20px;
        }
        .bottom-right {
            bottom: 20px;
            right: 20px;
        }
        
        /* Кнопка назад */
        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 10px 20px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            z-index: 10;
        }
        .back-btn:hover {
            background: #ff1493;
        }
        
        /* ========== НОВАЯ КНОПКА ПО ЦЕНТРУ ========== */
        .center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            padding: 15px 30px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            z-index: 10;
            transition: 0.2s;
            white-space: nowrap;
        }
        .center-btn:hover {
            background: #ff1493;
            transform: translate(-50%, -50%) scale(1.05);
        }
        
        /* Настройки для телефона */
        @media (max-width: 768px) {
            .corner-img img {
                width: 100px;
            }
            .corner-img figcaption {
                font-size: 6px;
                margin-top: 4px;
                padding: 3px 6px;
            }
            .top-left {
                top: 10px;
                left: 10px;
            }
            .top-right {
                top: 10px;
                right: 10px;
            }
            .bottom-left {
                bottom: 10px;
                left: 10px;
            }
            .bottom-right {
                bottom: 10px;
                right: 10px;
            }
            .back-btn {
                font-size: 8px;
                padding: 8px 16px;
            }
            /* Центральная кнопка на телефоне */
            .center-btn {
                font-size: 10px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Картинки по углам -->
    <figure class="corner-img top-left">
        <img src="d0e412b8d4718fcd4fb9c6ce12b7afbc.jpg" alt="я">
        <figcaption>я</figcaption>
    </figure>
    
    <figure class="corner-img top-right">
        <img src="f1d1c9e3b16e4481e5a3b058064b7d93.jpg" alt="тебя">
        <figcaption>тебя</figcaption>
    </figure>
    
    <figure class="corner-img bottom-left">
        <img src="20.05.2026_4-03-03.png" alt="очень">
        <figcaption>очень</figcaption>
    </figure>
    
    <figure class="corner-img bottom-right">
        <img src="84195a2d8a73058cab06d867620c00d6.jpg" alt="люблю">
        <figcaption>люблю</figcaption>
    </figure>
    
    <!-- НОВАЯ КНОПКА ПО ЦЕНТРУ -->
    <button class="center-btn" onclick="window.location.href='heart.html'">💖 нажми 💖</button>
    
    <!-- Кнопка назад -->
    <button class="back-btn" onclick="window.location.href='index.html'">назад</button>
</body>
</html>
