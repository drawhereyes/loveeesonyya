<!DOCTYPE html>
<html>
<head>
    <title>Галерея для тебя ❤️</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .gallery img { width: 200px; height: 200px; object-fit: cover; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .gallery img:hover { transform: scale(1.05); }
        h1 { color: #333; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>Твои милые картинки 💖</h1>
    <div class="gallery">
        <!-- Здесь будут твои картинки -->
    </div>
</body>
</html>
